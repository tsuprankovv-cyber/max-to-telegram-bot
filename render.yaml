services:
  - type: web
    name: max-to-telegram-bot
    env: python
    runtime: python312
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MAX_TOKEN
        sync: false
      - key: MAX_CHANNEL_ID
        sync: false
      - key: MAX_API_BASE
        value: "https://platform-api.max.ru"
      - key: MAX_WEBHOOK_SECRET
        generateValue: true
      - key: VERIFY_WEBHOOK_SECRET
        value: "1"
      - key: POLL_INTERVAL
        value: "15"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: "DEBUG"
      - key: LOG_RAW_MAX
        value: "1"
      - key: LOG_RAW_TG
        value: "1"
      - key: LOG_MARKUP
        value: "1"
      - key: LOG_MEDIA
        value: "1"
