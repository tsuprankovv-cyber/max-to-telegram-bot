services:
  - type: web
    name: max-to-telegram-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: MAX_TOKEN
        sync: false
      - key: MAX_CHANNEL_ID
        sync: false
      - key: MAX_API_BASE_URL
        value: "https://platform-api.max.ru"
      - key: POLL_INTERVAL
        value: "3"
      - key: PYTHONUNBUFFERED
        value: "1"
